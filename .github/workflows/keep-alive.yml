name: Keep Render service warm

on:
  schedule:
    # Every 10 minutes — under the 15-min spin-down threshold.
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping homepage
        run: |
          curl -fsS -o /dev/null -w "status=%{http_code}  ttfb=%{time_starttransfer}s\n" \
            -m 60 \
            https://characterforge.onrender.com/ || \
            (echo "ping failed; service may be cold-starting" && exit 0)
